<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sonia Link</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
html {
scroll-behavior: smooth;
}
body {
font-family: "Inter", sans-serif;
font-weight: 200;
color: #111;
background: #fafafa;
letter-spacing: 0.03em;
-webkit-font-smoothing: antialiased;
}
a {
color: inherit;
text-decoration: none;
}
button,
input,
select,
textarea {
font-family: "Inter", sans-serif;
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 100;
  padding: 24px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: transparent;
  transition: background 0.35s ease;
}
nav.scrolled {
  background: rgba(250, 250, 250, 0.92);
  backdrop-filter: blur(10px);
}
.nav-logo {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.nav-links {
  list-style: none;
  display: flex;
  gap: 22px;
}
.nav-links a {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.65;
  transition: opacity 0.2s ease;
}
.nav-links a:hover {
  opacity: 1;
}

.hero {
  width: 100%;
  height: 100vh;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.14);
}
.hero-text {
  position: relative;
  z-index: 2;
  text-align: center;
  color: #fff;
  padding: 0 18px;
}
.hero-text h1 {
  font-size: 42px;
  font-weight: 200;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.hero-text p {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.16em;
  opacity: 0.85;
  text-transform: uppercase;
}

.section {
  padding: 110px 32px;
  max-width: 1200px;
  margin: 0 auto;
}

.intro {
  max-width: 720px;
  margin: 0 auto;
  text-align: center;
  padding: 110px 32px 80px;
}
.intro p {
  font-size: 18px;
  line-height: 1.85;
  color: #2a2a2a;
}

.h2 {
  text-align: center;
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #9a9a9a;
  margin-bottom: 54px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
}
.card {
  cursor: pointer;
}
.card img {
  width: 100%;
  height: 78vh;
  object-fit: cover;
  display: block;
  transition: transform 0.7s ease;
}
.card:hover img {
  transform: scale(1.02);
}
.card-info {
  padding: 16px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
}
.card-info .name {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.card-info .price {
  font-size: 12px;
  font-weight: 300;
  color: #6b6b6b;
  white-space: nowrap;
}

footer {
  padding: 50px 32px;
  border-top: 1px solid #eee;
  text-align: center;
  color: #9a9a9a;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* MODALS */
.modal {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal.open {
  display: flex;
}
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(6px);
}
.modal-panel {
  position: relative;
  z-index: 2;
  width: min(980px, 100%);
  background: #fafafa;
  border: 1px solid #eee;
  box-shadow: 0 22px 70px rgba(0, 0, 0, 0.25);
  border-radius: 6px;
}
.modal-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 18px 0;
}
.modal-title {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #111;
  opacity: 0.9;
}
.modal-close {
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 22px;
  line-height: 1;
  padding: 8px 10px;
  opacity: 0.6;
  transition: opacity 0.2s ease;
}
.modal-close:hover {
  opacity: 1;
}

/* Product modal layout */
.product-wrap {
  padding: 16px 18px 18px;
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 18px;
}
.slider {
  position: relative;
  background: #f3f3f3;
  overflow: hidden;
  border: 1px solid #eee;
  min-height: 58vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.slide-img {
  width: 100%;
  height: 68vh;
  object-fit: cover;
  display: block;
}
.slider-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  border: 1px solid rgba(255, 255, 255, 0.55);
  background: rgba(0, 0, 0, 0.25);
  color: #fff;
  cursor: pointer;
  padding: 10px 12px;
  font-size: 14px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: background 0.2s ease, border-color 0.2s ease;
  user-select: none;
}
.slider-btn:hover {
  background: rgba(0, 0, 0, 0.38);
  border-color: rgba(255, 255, 255, 0.8);
}
.slider-prev {
  left: 12px;
}
.slider-next {
  right: 12px;
}

.dots {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 10px;
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 0 14px;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(0, 0, 0, 0.06);
  cursor: pointer;
  opacity: 0.9;
}
.dot.active {
  background: #fff;
  transform: scale(1.15);
}

.product-info {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-top: 2px;
}
.product-name {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  line-height: 1.7;
}
.product-price {
  font-size: 12px;
  font-weight: 300;
  color: #6b6b6b;
  letter-spacing: 0.08em;
}
.product-desc {
  font-size: 13px;
  color: #444;
  line-height: 1.8;
  white-space: pre-line;
  margin-top: 4px;
}
.btn {
  margin-top: 6px;
  width: 100%;
  padding: 14px 18px;
  border: 1px solid #111;
  background: transparent;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
}
.btn:hover {
  background: #111;
  color: #fff;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
  .card img {
    height: 70vh;
  }
  .hero-text h1 {
    font-size: 30px;
    letter-spacing: 0.18em;
  }
  .product-wrap {
    grid-template-columns: 1fr;
  }
  .slide-img {
    height: 58vh;
  }
}
</style>
</head>

<body>
<nav id="nav">
<div class="nav-logo">SONIALINK</div>
<ul class="nav-links">
<li><a href="#collection">Collection</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<header class="hero">
<img class="hero-image" src="фото/1.jpg" alt="SONIALINK" />
<div class="hero-overlay"></div>
<div class="hero-text">
<h1>SONIALINK</h1>
<p>made to measure</p>
</div>
</header>

<section class="intro">
<p>
Clothes with a private detail.
<br />
Made to measure in Khabarovsk. Delivery across Russia.
</p>
</section>

<section class="section" id="collection">
<div class="h2">Collection 01</div>
<div class="grid" id="grid"></div>
</section>

<section class="section" id="contact">
<div class="h2">Contact</div>
<div style="text-align:center; font-size:14px; color:#3a3a3a; line-height:2;">
Telegram: <a href="#" style="border-bottom:1px solid #ddd;">@yourtelegram</a><br />
Instagram: <a href="#" style="border-bottom:1px solid #ddd;">@sonialink</a><br />
Email: <a href="#" style="border-bottom:1px solid #ddd;">hello@sonialink.ru</a>
</div>
</section>

<footer>
SONIALINK · Khabarovsk · Russia
</footer>

<!-- PRODUCT MODAL -->
<div class="modal" id="productModal" aria-hidden="true">
<div class="modal-backdrop" data-close="product"></div>
<div class="modal-panel" role="dialog" aria-modal="true">
<div class="modal-top">
<div class="modal-title" id="productModalTitle">Item</div>
<button class="modal-close" type="button" data-close="product" aria-label="Close">×</button>
</div>

  <div class="product-wrap">
    <div class="slider">
      <button class="slider-btn slider-prev" type="button" id="prevBtn">←</button>
      <img class="slide-img" id="slideImg" src="" alt="" />
      <button class="slider-btn slider-next" type="button" id="nextBtn">→</button>
      <div class="dots" id="dots"></div>
    </div>

    <div class="product-info">
      <div class="product-name" id="productName"></div>
      <div class="product-price" id="productPrice"></div>
      <div class="product-desc" id="productDesc"></div>
      <button class="btn" type="button" id="orderBtn">Заказать</button>
    </div>
  </div>
</div>
</div>

<script>
const nav = document.getElementById("nav");
window.addEventListener("scroll", () => {
if (window.scrollY > 20) nav.classList.add("scrolled");
else nav.classList.remove("scrolled");
});

const PHOTO_DIR = "фото";

const products = [
  {
    id: "leather-jacket-01",
    name: "Кожаная куртка",
    price: "34 900 ₽",
    desc: "Кожаная куртка.\nМинималистичный силуэт, аккуратная посадка и выразительный внешний вид.",
    images: ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg"],
  },
  {
    id: "black-set-01",
    name: "Чёрная юбка и чёрная майка",
    price: "от 6 500 ₽",
    desc: "Чёрная юбка и чёрная майка.\nЛаконичный комплект для повседневного и вечернего образа.",
    images: ["19.jpg", "20.jpg", "21.jpg", "22.jpg"],
  },
  {
    id: "high-neck-dress-01",
    name: "Фиолетовое платье под горло",
    price: "13 500 ₽",
    desc: "Фиолетовое платье под горло.\nЭлегантная модель с мягкой посадкой и акцентом на силуэт.",
    images: ["35.jpg", "36.jpg", "37.jpg", "38.jpg"],
  },
  {
    id: "beige-maxi-skirt-01",
    name: "Юбка бежевая в пол",
    price: "13 900 ₽",
    desc: "Юбка бежевая в пол.\nПлавная линия, нейтральный оттенок, универсальный вариант для образов.",
    images: ["29.jpg", "30.jpg", "31.jpg"],
  },
  {
    id: "striped-top-01",
    name: "Полосатый топ",
    price: "7 100 ₽",
    desc: "Полосатый топ.\nЛёгкая базовая вещь для сочетаний с юбками и брюками.",
    images: ["23.jpg", "24.jpg"],
  },
  {
    id: "peach-shorts-01",
    name: "Шорты персиково-бежевые",
    price: "12 500 ₽",
    desc: "Шорты персиково-бежевые.\nКомфортная посадка и мягкий оттенок для летних образов.",
    images: ["26.jpg", "27.jpg", "28.jpg"],
  },
  {
    id: "lilac-dress-01",
    name: "Сиреневое платье",
    price: "12 900 ₽",
    desc: "Сиреневое платье.\nНежный цвет и женственный силуэт.",
    images: ["13.jpg", "14.jpg", "15.jpg"],
  },
  {
    id: "white-tank-01",
    name: "Майка белая",
    price: "5 500 ₽",
    desc: "Майка белая.\nБазовая вещь для повседневных образов.",
    images: ["39.jpg", "40.jpg", "41.jpg"],
  },
  {
    id: "mint-bralette-01",
    name: "Лиф ментоловый",
    price: "7 200 ₽",
    desc: "Лиф ментоловый.\nАкцентный и нежный оттенок, удобная посадка.",
    images: ["10.jpg", "11.jpg", "12(1).jpg", "12.jpg"],
  },
  {
    id: "white-bra-01",
    name: "Бюстгальтер белый",
    price: "7 200 ₽",
    desc: "Бюстгальтер белый.\nМинималистичная модель на каждый день.",
    images: ["32.jpg", "33.jpg", "34.jpg"],
  },
  {
    id: "pants-01",
    name: "Штаны",
    price: "8 500 ₽",
    desc: "Штаны.\nУниверсальная базовая модель для сочетания с топами и рубашками.",
    images: ["7.jpg", "8.jpg", "9.jpg"],
  },
  {
    id: "leather-shorts-01",
    name: "Шорты кожаные",
    price: "12 900 ₽",
    desc: "Шорты кожаные.\nСтильная модель с характерным акцентом.",
    images: ["45.jpg", "46.jpg"],
  },
];

const grid = document.getElementById("grid");
grid.innerHTML = products
  .map(
    (p) => `
  <div class="card" data-id="${p.id}" tabindex="0" role="button" aria-label="Open ${p.name}">
    <img src="${PHOTO_DIR}/${p.images[0]}" alt="${p.name}" />
    <div class="card-info">
      <div class="name">${p.name}</div>
      <div class="price">${p.price}</div>
    </div>
  </div>
`
  )
  .join("");

const productModal = document.getElementById("productModal");
const slideImg = document.getElementById("slideImg");
const dots = document.getElementById("dots");
const productName = document.getElementById("productName");
const productPrice = document.getElementById("productPrice");
const productDesc = document.getElementById("productDesc");
const productModalTitle = document.getElementById("productModalTitle");
const orderBtn = document.getElementById("orderBtn");

let currentProduct = null;
let currentIndex = 0;

function openModal(el) {
  el.classList.add("open");
  el.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
}

function closeModal(el) {
  el.classList.remove("open");
  el.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
}

function setSlide(index) {
  if (!currentProduct) return;
  const total = currentProduct.images.length;
  currentIndex = (index + total) % total;

  const src = PHOTO_DIR + "/" + currentProduct.images[currentIndex];
  slideImg.src = src;
  slideImg.alt = currentProduct.name + " фото " + (currentIndex + 1);

  [...dots.children].forEach((d, i) => d.classList.toggle("active", i === currentIndex));
}

function renderDots() {
  dots.innerHTML = "";
  currentProduct.images.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.addEventListener("click", () => setSlide(i));
    dots.appendChild(d);
  });
}

function openProductById(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  currentProduct = p;
  currentIndex = 0;

  productModalTitle.textContent = p.name;
  productName.textContent = p.name;
  productPrice.textContent = p.price;
  productDesc.textContent = p.desc;

  renderDots();
  setSlide(0);
  openModal(productModal);
}

grid.addEventListener("click", (e) => {
  const card = e.target.closest(".card");
  if (!card) return;
  openProductById(card.dataset.id);
});

grid.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const card = e.target.closest(".card");
  if (!card) return;
  openProductById(card.dataset.id);
});

document.getElementById("prevBtn").addEventListener("click", () => setSlide(currentIndex - 1));
document.getElementById("nextBtn").addEventListener("click", () => setSlide(currentIndex + 1));

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (productModal.classList.contains("open")) closeModal(productModal);
  }
  if (!productModal.classList.contains("open")) return;
  if (e.key === "ArrowLeft") setSlide(currentIndex - 1);
  if (e.key === "ArrowRight") setSlide(currentIndex + 1);
});

let touchStartX = null;
const slider = document.querySelector(".slider");
slider.addEventListener(
  "touchstart",
  (e) => {
    touchStartX = e.touches[0].clientX;
  },
  { passive: true }
);

slider.addEventListener(
  "touchend",
  (e) => {
    if (touchStartX === null) return;
    const endX = e.changedTouches[0].clientX;
    const dx = endX - touchStartX;
    if (Math.abs(dx) > 40) {
      if (dx > 0) setSlide(currentIndex - 1);
      else setSlide(currentIndex + 1);
    }
    touchStartX = null;
  },
  { passive: true }
);

document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-close]");
  if (!btn) return;

  const type = btn.getAttribute("data-close");
  if (type === "product") closeModal(productModal);
});

orderBtn.addEventListener("click", () => {
  if (!currentProduct) return;
  
  // Закрываем окно товара
  closeModal(productModal);
  
  // Укажите юзернейм вашего бота (например: SONIALINK_bot) без знака @
  const botUsername = "YOUR_BOT_USERNAME"; 
  window.open(`https://t.me/SONIALINKorder_bot`, "_blank");
});
</script>
</body>
</html>
